name: Deploy Flutter web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "landing/**"
      - "docs/report_MR_app/medremind_user_guide.pdf"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.1"

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        run: flutter build web --release --base-href /Medremind_v2/app/

      - name: Assemble Pages site (landing page at root, Flutter app under /app)
        run: |
          mkdir -p site
          cp -r landing/. site/
          mkdir -p site/app
          cp -r app/build/web/. site/app/
          cp docs/report_MR_app/medremind_user_guide.pdf site/medremind_user_guide.pdf
          cp docs/report_MR_app/medremind_user_guide.pdf site/app/medremind_user_guide.pdf

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
