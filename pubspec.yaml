name: med_remind_v2
description: "MedRemind v2 — Medicine Reminder App"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.3

  # Persistence
  shared_preferences: ^2.3.3

  # Fonts (Inter via Google Fonts)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/generic_groups_seed.json
